<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Quick Status</ion-title>
    <app-keyboard-shortcuts slot="end"></app-keyboard-shortcuts>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Quick Status</ion-title>
    </ion-toolbar>
  </ion-header>

  <div id="container">
    <ion-segment
      class="project-segment"
      [value]="selectedProjectId"
      (ionChange)="onProjectSegmentChange($event)"
      scrollable="true"
    >
      <ion-segment-button
        *ngFor="let project of projects"
        [value]="project.id"
        [class.active-project]="project.id === selectedProjectId"
      >
        <ion-label>{{ project.name }}</ion-label>
        <ion-icon
          *ngIf="project.id === selectedProjectId"
          name="create-outline"
          class="edit-icon"
          (click)="onEditIconClick($event)"
        ></ion-icon>
      </ion-segment-button>
      <ion-segment-button
        [value]="addProjectSegmentValue"
        class="add-project-button"
      >
        <ion-icon name="add-outline"></ion-icon>
      </ion-segment-button>
      <ion-segment-button
        [value]="reorderProjectSegmentValue"
        class="reorder-project-button"
      >
        <ion-icon name="reorder-three-outline"></ion-icon>
      </ion-segment-button>
    </ion-segment>

    <app-task-list
      #taskList
      [tasksString]="currentTasksString"
      (listChange)="handleTaskListChange($event)"
    ></app-task-list>
  </div>

  <ion-modal #reorderModal trigger="open-reorder-modal">
    <ng-template>
      <ion-header>
        <ion-toolbar>
          <ion-title>Reorder Projects</ion-title>
          <ion-buttons slot="end">
            <ion-button (click)="cancelReorder()">Cancel</ion-button>
            <ion-button (click)="saveReorder()" strong="true">Save</ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>
      <ion-content class="ion-padding">
        <ion-list>
          <ion-reorder-group
            (ionItemReorder)="handleReorder($event)"
            disabled="false"
          >
            <ion-item *ngFor="let project of reorderProjects">
              <ion-label>{{ project.name }}</ion-label>
              <ion-reorder slot="end"></ion-reorder>
            </ion-item>
          </ion-reorder-group>
        </ion-list>
      </ion-content>
    </ng-template>
  </ion-modal>
</ion-content>

<ion-footer>
  <ion-toolbar>
    <ion-buttons slot="end">
      <ion-button (click)="taskList.addTask()">
        <ion-icon slot="start" name="add-circle-outline"></ion-icon>
        Add Task
      </ion-button>
      <ion-button (click)="taskList.copyTasksToClipboard()">
        <ion-icon slot="start" name="copy-outline"></ion-icon>
        Copy List
      </ion-button>
      <ion-button id="open-paste-modal">
        <ion-icon slot="start" name="clipboard-outline"></ion-icon>
        Paste List
      </ion-button>
      <ion-button (click)="taskList.resetTasks()" color="danger">
        <ion-icon slot="start" name="refresh-outline"></ion-icon>
        Reset List
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-footer>
