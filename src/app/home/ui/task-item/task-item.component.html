<ion-item
  lines="none"
  class="task-row"
  [class.private-row]="task.private === true"
  [class.section-heading-row]="task.sectionHeading === true"
>
  <ion-grid>
    <ion-row class="ion-align-items-center">
      <ion-col size="auto">
        <ion-segment
          [(ngModel)]="task.status"
          (ionChange)="emitChange()"
          [disabled]="task.sectionHeading === true"
        >
          <ion-segment-button value="✅">✅</ion-segment-button>
          <ion-segment-button value="☑️">☑️</ion-segment-button>
          <ion-segment-button value="❌">❌</ion-segment-button>
        </ion-segment>
      </ion-col>
      <ion-col>
        <ion-input
          [class.section-heading-input]="task.sectionHeading === true"
          style="width: 100%"
          [(ngModel)]="task.text"
          (ionInput)="emitChange()"
          (keydown.enter)="emitEnterKey()"
          (keydown)="handleKeydown($event)"
          placeholder="Enter task"
          name="task"
          autocomplete="off"
          data-lpignore="true"
          role="note"
        ></ion-input>
      </ion-col>
      <ion-col size="auto">
        <ion-button
          fill="solid"
          (click)="toggleSectionHeading()"
          class="section-heading-button"
          [class.active]="task.sectionHeading === true"
          title="Toggle section heading"
          size="small"
        >
          <ion-icon name="text-outline"></ion-icon>
        </ion-button>
        <ion-button
          fill="solid"
          (click)="togglePrivate()"
          class="private-button"
          [class.active]="task.private === true"
          title="Toggle private (excludes from copy)"
          size="small"
        >
          <ion-icon
            [name]="task.private === true ? 'lock-closed-outline' : 'lock-open-outline'"
          ></ion-icon>
        </ion-button>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-item>
